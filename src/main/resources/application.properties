# ===================================================================
# APPLICATION CONFIGURATIONS
# ===================================================================
spring.application.name=digital-banking
server.port=${PORT:8080}
server.shutdown=graceful

# ===================================================================
# DATABASE (H2 tuned for High Concurrency)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=2000;DATABASE_TO_UPPER=FALSE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Database Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/V1__create_tables.sql
spring.sql.init.data-locations=classpath:db/V1__data.sql

# ===================================================================
# CONNECTION POOL TUNING (HikariCP - Real-World Scenario)
# ===================================================================
spring.datasource.hikari.pool-name=BankingHighConcurrencyPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:50}
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=2000

# ===================================================================
# WEB SERVER TUNING (Tomcat - Support for flood of requests)
# ===================================================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=100

# ===================================================================
# DOCUMENTATION (Swagger/OpenAPI) & H2 CONSOLE
# ===================================================================
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true

# ===================================================================
# LOGS AND AUDITING (Crucial for monitoring concurrency)
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.jdbc.core.JdbcTemplate=INFO